name: Deployment
on:
  push:
    branches:
      - main
      - dev
      
  workflow_dispatch
env:
  MANGODB_DB_NAME: see-demo
jobs:
  test:
    env:
      MANGODB_CLUSTERS_ADDRESS: cluster0.zevgkpo.mongodb.net
      MANGODB_USERNAME: seetha0706_db_user
      MANGODB_PASSWORD: A5Nrkyf1yWSMcToq
      PORT: 8080
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: echo "MANGODB_USERNAME= ${{env.MANGODB_USERNAME}}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MANGODB_USERNAME= ${{env.MANGODB_USERNAME}}"
          echo "MANGODB_PASSWORD= $MANGODB_PASSWORD"
